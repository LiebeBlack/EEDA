name: Update GitHub Metrics

on:
  # Ejecutar automáticamente a medianoche UTC todos los días
  schedule:
    - cron: '0 0 * * *'
  
  # Permitir ejecución manual desde la interfaz de GitHub
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-metrics:
    runs-on: ubuntu-latest
    
    steps:
      # 1. Checkout del repositorio
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      
      # 2. Configurar Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      # 3. Instalar dependencias
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyGithub requests
      
      # 4. Ejecutar script de actualización
      - name: Update metrics
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python update_metrics.py
      
      # 5. Configurar git
      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      
      # 6. Verificar cambios y hacer commit
      - name: Commit and push changes
        run: |
          git add data/stats.json
          if git diff --cached --quiet; then
            echo "No hay cambios para commitear"
          else
            git commit -m "📊 Actualización automática de métricas - $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
            git push origin main
            echo "✅ Métricas actualizadas y pusheadas a main"
          fi
